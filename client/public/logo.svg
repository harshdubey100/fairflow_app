<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo symbol -->
  <g>
    <!-- Star background circle -->
    <circle cx="30" cy="50" r="28" fill="url(#grad1)" opacity="0.15"/>
    
    <!-- Main star -->
    <polygon points="30,15 38,35 60,35 42,48 50,68 30,55 10,68 18,48 0,35 22,35" fill="url(#grad1)"/>
    
    <!-- Accent stars -->
    <circle cx="12" cy="20" r="2.5" fill="#667eea" opacity="0.7"/>
    <circle cx="48" cy="25" r="2" fill="#764ba2" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="75" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#667eea">FairFlow</text>
  <text x="75" y="82" font-family="Arial, sans-serif" font-size="14" fill="#764ba2" opacity="0.8">Intelligent Ticket Management</text>
</svg>